<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Доступ запрещён</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    h1 { color: #c0392b; }
    a { color: #768086; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Ошибка 403</h1>
  <h1>Доступ запрещён</h1>
  <p>У вас нет прав для доступа к этой странице.</p>
  {% if user %}
    <p>Пользователь: <strong>{{ user }}</strong></p>
  {% endif %}
  <p><a href="{{ url_for('home') }}">Вернуться на главную</a></p>
</body>
</html>
